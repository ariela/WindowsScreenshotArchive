[tools]
go="1.26"
golangci-lint="latest"

[tasks.build]
description = "Build for current platform"
run = "go build -o bin/archive-convert ./cmd/archive-convert"

[tasks."build:windows"]
description = "Cross-compile for Windows (amd64)"
run = "GOOS=windows GOARCH=amd64 go build -o bin/archive-convert.exe ./cmd/archive-convert"

[tasks.test]
description = "Run all tests"
run = "go test ./..."

[tasks.vet]
description = "Run go vet"
run = "go vet ./..."

[tasks.lint]
description = "Run golangci-lint"
run = "golangci-lint run ./..."

[tasks.check]
description = "Run all CI checks (vet + lint + test)"
depends = ["vet", "lint", "test"]
